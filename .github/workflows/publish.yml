name: Publish to crates.io

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  publish:
    name: Publish crates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install latest Rust stable
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Verify version matches release tag
        if: github.event_name == 'release'
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          TAG_VERSION="${TAG#v}"
          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.workspace_members[0]' | grep -oP '\d+\.\d+\.\d+')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Release tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi

      - name: Run tests
        run: cargo test --workspace

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          publish_crate() {
            local crate=$1
            echo "::group::Publishing $crate"
            OUTPUT=$(cargo publish -p "$crate" 2>&1) && {
              echo "$OUTPUT"
              echo "Published $crate successfully"
            } || {
              if echo "$OUTPUT" | grep -q "already exists"; then
                echo "$OUTPUT"
                echo "::warning::$crate already published, skipping"
              else
                echo "$OUTPUT"
                echo "::error::Failed to publish $crate"
                echo "::endgroup::"
                return 1
              fi
            }
            echo "::endgroup::"
            sleep 15
          }

          # Publish in dependency order
          publish_crate db-http-core
          publish_crate sqlx-http-macros
          publish_crate turso-http
          publish_crate neon-http
          publish_crate planetscale-http
          publish_crate sqlx-http
